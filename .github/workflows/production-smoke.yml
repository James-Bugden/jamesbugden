# production-smoke.yml — synthetic check against the live site.
#
# Runs on:
#   - push to main (post-merge confirmation that deploy is healthy
#     once James clicks Publish in Lovable)
#   - every 30 minutes via cron, so a Lovable "Changes" commit that
#     James auto-publishes can't sit broken for hours unnoticed
#   - manual workflow_dispatch when you want to force-check
#
# What it does:
#   - Fetches the three guest pages (/, /zh-tw, /login) from the live
#     site. Each must return 200 and contain a known marker string.
#     Markers are the kind of copy that survives polish but disappears
#     in a real regression (e.g. the homepage hero claim, the ZH page
#     title, the auth provider name on /login).
#   - Boots a headless Chromium against the live URL and asserts the
#     React shell mounted (presence of <div id="root"> with children),
#     so a white-screen JS bundle error fails the check.
#
# Why two layers (HTTP + Playwright):
#   - HTTP catches CDN/DNS/SSL breakage that Playwright wouldn't see
#     because Playwright would hit a cached browser page.
#   - Playwright catches React-runtime errors (broken bundle, env-var
#     missing) that return 200 but render a blank page.
#
# On failure:
#   - Opens (or appends to an open) GitHub issue tagged `incident` and
#     `production` with the failing URL, response status, and last
#     successful run timestamp.
#   - Does NOT auto-rollback. Lovable deploys are manual; the human
#     decides whether to revert or hot-fix.

name: production-smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"  # every 30 min — scheduled runs use main
  workflow_dispatch:

concurrency:
  group: production-smoke
  cancel-in-progress: false  # never cancel an in-flight smoke; let it finish

jobs:
  http-check:
    name: production HTTP check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      failed-urls: ${{ steps.probe.outputs.failed }}
    steps:
      - uses: actions/checkout@v4
      - name: Probe guest pages
        id: probe
        env:
          PROD_BASE: https://jamesbugden.com
        run: |
          node scripts/production-http-probe.mjs

  playwright-check:
    name: production Playwright shell-mount
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: http-check
    if: ${{ needs.http-check.outputs.failed-urls == '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Mount-check on live site
        env:
          PROD_BASE: https://jamesbugden.com
        run: npx playwright test src/test/e2e/production-mount.spec.ts --project=chromium-desktop
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-report
          path: playwright-report/
          retention-days: 30  # keep longer for incident post-mortem

  notify-on-failure:
    name: open incident issue on failure
    runs-on: ubuntu-latest
    needs: [http-check, playwright-check]
    # Only fire if either check failed AND we're on a scheduled/main run
    # (don't open issues for manual workflow_dispatch dry-runs).
    if: |
      always() &&
      (needs.http-check.result == 'failure' || needs.playwright-check.result == 'failure') &&
      github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Open / update incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_URLS: ${{ needs.http-check.outputs.failed-urls }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/open-production-incident.mjs

name: Production smoke monitor

# Runs the guest smoke tests against jamesbugden.com AFTER each code change
# lands on main. Waits a few minutes first to give Lovable time to deploy,
# then verifies the live site is healthy. Emails ALERT_EMAIL_TO on failure.
#
# Does NOT run on a cron schedule — only when you actually push code — so
# it doesn't burn Actions minutes or send spurious alerts when prod is idle.
# Trigger manually via "Actions → Production smoke monitor → Run workflow"
# if you want to check prod health at any other time.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ALERT_EMAIL_TO     — where failure notifications go (your inbox)
#   GMAIL_USERNAME     — the Gmail address that sends the alert
#   GMAIL_APP_PASSWORD — Gmail "App Password" (NOT your regular password)
#                        https://myaccount.google.com/apppasswords
#
# Optional (for auth-gated CJK preview check — leave unset to skip):
#   QA_TEST_EMAIL     — login of a real account used only for tests
#   QA_TEST_PASSWORD  — its password

on:
  push:
    branches: [main]
    # Don't bother re-running when only docs / Claude metadata change.
    paths-ignore:
      - "**/*.md"
      - ".claude/**"
      - "docs/**"
  workflow_dispatch:

concurrency:
  # If a previous run is still going when the next tick fires, cancel the
  # older one so alerts reflect the current state of prod, not a stale view.
  group: prod-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      QA_BASE_URL: https://jamesbugden.com
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Give Lovable ~4 min to build + deploy the commit that triggered this
      # run before we probe prod. Without this we'd be hitting the OLD live
      # build and getting false-alarm emails. Adjust up if your typical
      # Lovable deploy takes longer.
      - name: Wait for Lovable deploy
        if: github.event_name == 'push'
        run: sleep 240

      - name: Run prod smoke
        id: smoke
        run: npx playwright test src/test/e2e/smoke.e2e.spec.ts
        env:
          QA_TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          QA_TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report-${{ github.run_number }}
          path: playwright-report
          retention-days: 14

      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[jamesbugden.com] Prod smoke FAILED (run #${{ github.run_number }})"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "jamesbugden.com monitor <${{ secrets.GMAIL_USERNAME }}>"
          body: |
            One or more production smoke tests failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Artifact (screenshots + trace): available on the run page under "Artifacts".

            This is an automated alert. Do not reply.
